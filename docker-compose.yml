services:
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-vrg_root_secret}
      MYSQL_DATABASE:      vrg
      MYSQL_USER:          ${DB_USER:-vrg_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-vrg_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - "3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  app:
    build: .
    environment:
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     vrg
      DB_USER:     ${DB_USER:-vrg_user}
      DB_PASSWORD: ${DB_PASSWORD:-vrg_pass}
      JWT_SECRET:  ${JWT_SECRET:-change_this_in_production}
      PORT:        80
    volumes:
      - uploads:/app/uploads
    ports:
      - "8001:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  uploads:
