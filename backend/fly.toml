app            = "vrg-api"
primary_region = "jnb"   # Johannesburg — plus proche de Madagascar

[build]
  dockerfile = "Dockerfile"

[env]
  PORT    = "4000"
  DB_HOST = "vrg-db.internal"
  DB_PORT = "3306"
  DB_NAME = "vrg"
  DB_USER = "vrg_user"
  # Secrets (ne pas mettre ici) :
  #   fly secrets set -a vrg-api DB_PASSWORD=... JWT_SECRET=...

[http_service]
  internal_port        = 4000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[mounts]]
  source       = "vrg_uploads"
  destination  = "/app/uploads"
  initial_size = "1"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
