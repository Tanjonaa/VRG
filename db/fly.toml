app            = "vrg-db"
primary_region = "jnb"

# Image officielle — pas de Dockerfile nécessaire
# Les tables sont créées par l'API au démarrage (CREATE TABLE IF NOT EXISTS)
[build]
  image = "mariadb:11"

[env]
  MYSQL_DATABASE = "vrg"
  MYSQL_USER     = "vrg_user"
  # Secrets à définir :
  #   fly secrets set -a vrg-db MYSQL_ROOT_PASSWORD=... MYSQL_PASSWORD=...

# Accessible uniquement via le réseau privé Fly.io : vrg-db.internal:3306
# Aucun port public exposé

[[mounts]]
  source       = "vrg_mariadb"
  destination  = "/var/lib/mysql"
  initial_size = 3

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
